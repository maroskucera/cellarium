<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracker — Setup</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <main>
        <h1>Loan Tracker</h1>
        <h2>Set Up Your Loan</h2>

        <form method="POST" action="/setup">
            <fieldset>
                <legend>Loan Details</legend>

                <label for="loan_amount">Loan Amount</label>
                <input type="text" id="loan_amount" name="loan_amount"
                       inputmode="decimal" placeholder="e.g. 10000.00" required>

                <label for="loan_date">Loan Date</label>
                <input type="date" id="loan_date" name="loan_date" required>
            </fieldset>

            <fieldset>
                <legend>Payments Already Made (optional)</legend>

                {{range $i := .PaymentSlots}}
                <div class="payment-row">
                    <label for="payment_amount_{{$i}}">Amount #{{$i}}</label>
                    <input type="text" id="payment_amount_{{$i}}" name="payment_amount_{{$i}}"
                           inputmode="decimal" placeholder="e.g. 500.00">

                    <label for="payment_date_{{$i}}">Date #{{$i}}</label>
                    <input type="date" id="payment_date_{{$i}}" name="payment_date_{{$i}}">
                </div>
                {{end}}
            </fieldset>

            <button type="submit">Start Tracking</button>
        </form>
    </main>
</body>
</html>
