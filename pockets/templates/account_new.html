{{define "account_new"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
    <title>New Account — Pockets</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main>
        <header class="site-header">
            <a href="/" class="site-title">Pockets</a>
        </header>
        <h1>New Account</h1>

        <form method="POST" action="/accounts">
            <fieldset>
                <legend>Account Details</legend>

                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="icon">Icon</label>
                <input type="text" id="icon" name="icon" required maxlength="2"
                       placeholder="e.g. 🏠">

                <label>Colour</label>
                <div class="colour-picker" role="radiogroup" aria-label="Account colour">
                    {{range .Colours}}
                    <label class="colour-swatch">
                        <input type="radio" name="colour" value="{{.Key}}"{{if eq .Key "steel"}} checked{{end}}>
                        <span class="swatch" style="background: {{.Hex}}" title="{{.Name}}"></span>
                        <span class="colour-name">{{.Name}}</span>
                    </label>
                    {{end}}
                </div>

                <label for="target_amount">Target Amount (optional)</label>
                <input type="text" id="target_amount" name="target_amount"
                       inputmode="decimal" placeholder="e.g. 5 000,00">

                <label for="initial_balance">Initial Balance (optional)</label>
                <input type="text" id="initial_balance" name="initial_balance"
                       inputmode="decimal" placeholder="e.g. 1 000,00">

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="is_reserve" value="true">
                        <span>Reserve account (pre-selected for new transactions)</span>
                    </label>
                </div>
            </fieldset>

            <button type="submit">Create Account</button>
        </form>
    </main>
</body>
</html>
{{end}}
