{{define "forecast_all"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
    <title>Forecast — All Accounts — Pockets</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main>
        <header class="site-header">
            <a href="/" class="site-title">Pockets</a>
        </header>
        <h1>Forecast — All Accounts</h1>

        <div class="forecast-toggle">
            <a href="/forecast?months=6"{{if eq .Months 6}} class="active"{{end}}>6 months</a>
            <a href="/forecast?months=12"{{if eq .Months 12}} class="active"{{end}}>12 months</a>
        </div>

        <div class="forecast-all-wrapper">
        <table class="forecast-table forecast-all">
            <thead>
                <tr>
                    <th>Month</th>
                    {{range .Accounts}}
                    <th>{{.Icon}} {{.Name}}</th>
                    {{end}}
                </tr>
            </thead>
            <tbody>
                {{range .Rows}}
                <tr>
                    <td>{{.Month}}</td>
                    {{range .Balances}}
                    <td>{{.}}</td>
                    {{end}}
                </tr>
                {{end}}
            </tbody>
        </table>
        </div>
    </main>
</body>
</html>
{{end}}
