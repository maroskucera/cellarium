{{define "transaction_edit"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
    <title>Edit Transaction — Pockets</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main>
        <header class="site-header">
            <a href="/" class="site-title">Pockets</a>
        </header>
        <h1>Edit Transaction</h1>

        {{template "account_nav" .Nav}}

        <form method="POST" action="/accounts/{{.AccountID}}/transactions/{{.Transaction.ID}}/edit">
            <fieldset>
                <legend>Transaction Details</legend>

                <label for="amount">Amount</label>
                <input type="text" id="amount" name="amount" inputmode="decimal"
                       value="{{.Transaction.Amount}}" required>

                <label>Direction</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="direction" value="out"{{if not .Transaction.IsInflow}} checked{{end}}>
                        <span>Out</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="direction" value="in"{{if .Transaction.IsInflow}} checked{{end}}>
                        <span>In</span>
                    </label>
                </div>

                <label for="tx_date">Date</label>
                <input type="date" id="tx_date" name="tx_date" value="{{.Transaction.Date}}" required>

                <label for="note">Note (optional)</label>
                <input type="text" id="note" name="note" value="{{.Transaction.Note}}">
            </fieldset>

            <button type="submit">Save Changes</button>
        </form>
    </main>
</body>
</html>
{{end}}
