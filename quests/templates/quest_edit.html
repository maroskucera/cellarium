{{define "quest_edit"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — Edit Quest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>Edit Quest</h1>
    <form id="edit-form" method="post" action="{{.Action}}">
        <fieldset>
            <legend>Quest Details</legend>

            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{.Quest.Title}}" required autofocus>

            <label for="description">Description</label>
            <textarea id="description" name="description">{{.Quest.Description}}</textarea>

            <div id="quest-type-field">
            <label for="quest_type">Type</label>
            <select id="quest_type" name="quest_type">
                <option value="main"{{if eq .Quest.QuestType "main"}} selected{{end}}>Main</option>
                <option value="side"{{if eq .Quest.QuestType "side"}} selected{{end}}>Side</option>
                <option value="daily"{{if eq .Quest.QuestType "daily"}} selected{{end}}>Daily</option>
            </select>
            </div>

            <label for="quest_date">Due Date</label>
            <div class="input-with-clear">
                <input type="date" id="quest_date" name="quest_date" value="{{.Quest.QuestDate}}">
                <button type="button" class="btn-clear" onclick="this.closest('.input-with-clear').querySelector('input').value=''" aria-label="Clear date">&times;</button>
            </div>

            <label for="quest_line_id">Quest Line</label>
            <select id="quest_line_id" name="quest_line_id">
                <option value="0">— none —</option>
                {{range .QuestLines}}
                <option value="{{.ID}}"{{if .Selected}} selected{{end}} data-quest-type="{{.QuestType}}">{{.Name}}</option>
                {{end}}
            </select>

            <label for="quest_giver">Quest Giver</label>
            <input type="text" id="quest_giver" name="quest_giver" value="{{.Quest.QuestGiver}}" list="quest-givers-list">
            <datalist id="quest-givers-list"></datalist>

            <label for="reminder_time">Reminder Time</label>
            <div class="input-with-clear">
                <input type="time" id="reminder_time" name="reminder_time" value="{{.Quest.ReminderTime}}">
                <button type="button" class="btn-clear" onclick="this.closest('.input-with-clear').querySelector('input').value=''" aria-label="Clear time">&times;</button>
            </div>
        </fieldset>

        <fieldset>
            <legend>Recurrence</legend>
            <label for="recurrence_type">Repeat</label>
            <select id="recurrence_type" name="recurrence_type">
                <option value="none"{{if eq .Quest.RecurrenceType "none"}} selected{{end}}>Never</option>
                <option value="every"{{if eq .Quest.RecurrenceType "every"}} selected{{end}}>Every N</option>
                <option value="after_completion"{{if eq .Quest.RecurrenceType "after_completion"}} selected{{end}}>After completion</option>
            </select>
            <div class="recurrence-row">
                <div>
                    <label for="recurrence_n">Every</label>
                    <input type="number" id="recurrence_n" name="recurrence_n" value="{{.Quest.RecurrenceN}}" min="1" max="365">
                </div>
                <div>
                    <label for="recurrence_unit">Unit</label>
                    <select id="recurrence_unit" name="recurrence_unit">
                        <option value="days"{{if eq .Quest.RecurrenceUnit "days"}} selected{{end}}>Days</option>
                        <option value="weeks"{{if eq .Quest.RecurrenceUnit "weeks"}} selected{{end}}>Weeks</option>
                        <option value="months"{{if eq .Quest.RecurrenceUnit "months"}} selected{{end}}>Months</option>
                    </select>
                </div>
            </div>
            <div id="recurrence-end-section">
                <label for="recurrence_end_mode">Ends</label>
                <select id="recurrence_end_mode" name="recurrence_end_mode">
                    <option value="never"{{if eq .Quest.RecurrenceEndMode "never"}} selected{{end}}>Never</option>
                    <option value="end_date"{{if eq .Quest.RecurrenceEndMode "end_date"}} selected{{end}}>On date</option>
                    <option value="end_after"{{if eq .Quest.RecurrenceEndMode "end_after"}} selected{{end}}>After N instances</option>
                </select>
                <div id="recurrence-end-date-field">
                    <label for="recurrence_end_date">End Date</label>
                    <input type="date" id="recurrence_end_date" name="recurrence_end_date" value="{{.Quest.RecurrenceEndDate}}">
                </div>
                <div id="recurrence-end-after-field">
                    <label for="recurrence_max_instances">Total Instances</label>
                    <input type="number" id="recurrence_max_instances" name="recurrence_max_instances" value="{{.Quest.RecurrenceMaxInstances}}" min="2" max="999">
                </div>
            </div>
        </fieldset>

    </form>
    <div class="btn-row">
        <button type="submit" form="edit-form">Save Changes</button>
        <form method="post" action="/quests/{{.Quest.ID}}/delete" class="inline-form">
            <button type="submit" class="btn-danger-sm" onclick="return confirm('Delete this quest?')">Delete</button>
        </form>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</main>
<script src="/static/autocomplete.js"></script>
<script>
(function() {
    var lineSelect = document.getElementById('quest_line_id');
    var typeField = document.getElementById('quest_type');
    var typeFieldDiv = document.getElementById('quest-type-field');
    function syncType() {
        var opt = lineSelect.options[lineSelect.selectedIndex];
        var qt = opt ? opt.dataset.questType : '';
        if (qt) {
            typeField.value = qt;
            typeFieldDiv.style.display = 'none';
        } else {
            typeFieldDiv.style.display = '';
        }
    }
    lineSelect.addEventListener('change', syncType);
    syncType();

    var recType = document.getElementById('recurrence_type');
    var recEndSection = document.getElementById('recurrence-end-section');
    var recEndMode = document.getElementById('recurrence_end_mode');
    var recEndDateField = document.getElementById('recurrence-end-date-field');
    var recEndAfterField = document.getElementById('recurrence-end-after-field');
    function syncRecurrenceEnd() {
        var isEvery = recType.value === 'every';
        recEndSection.style.display = isEvery ? '' : 'none';
        if (isEvery) {
            recEndDateField.style.display = recEndMode.value === 'end_date' ? '' : 'none';
            recEndAfterField.style.display = recEndMode.value === 'end_after' ? '' : 'none';
        }
    }
    recType.addEventListener('change', syncRecurrenceEnd);
    recEndMode.addEventListener('change', syncRecurrenceEnd);
    syncRecurrenceEnd();
}());
</script>
</body>
</html>
{{end}}
