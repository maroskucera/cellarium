{{define "quest_line_edit"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — Edit Quest Line</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>Edit Quest Line</h1>
    <form id="edit-form" method="post" action="{{.Action}}">
        <fieldset>
            <legend>Quest Line</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required autofocus
                value="{{if .Line}}{{.Line.Name}}{{end}}"
                {{if .Errors}}{{if index .Errors "name"}}aria-describedby="name-err"{{end}}{{end}}>
            {{if .Errors}}{{if index .Errors "name"}}
            <p id="name-err" style="color:var(--text);font-size:0.875rem">{{index .Errors "name"}}</p>
            {{end}}{{end}}

            <label for="description">Description</label>
            <textarea id="description" name="description">{{if .Line}}{{if .Line.Description.Valid}}{{.Line.Description.String}}{{end}}{{end}}</textarea>

            <label for="quest_type">Type</label>
            <select id="quest_type" name="quest_type">
                <option value=""{{if .Line}}{{if not .Line.QuestType.Valid}} selected{{end}}{{end}}>— none —</option>
                <option value="main"{{if .Line}}{{if and .Line.QuestType.Valid (eq .Line.QuestType.String "main")}} selected{{end}}{{end}}>Main</option>
                <option value="side"{{if .Line}}{{if and .Line.QuestType.Valid (eq .Line.QuestType.String "side")}} selected{{end}}{{end}}>Side</option>
                <option value="daily"{{if .Line}}{{if and .Line.QuestType.Valid (eq .Line.QuestType.String "daily")}} selected{{end}}{{end}}>Daily</option>
            </select>
        </fieldset>
    </form>
    <div class="btn-row">
        <button type="submit" form="edit-form">Save Changes</button>
        {{if .Line}}
        <a href="/quest-lines/{{.Line.ID}}" class="btn btn-secondary">View Quests</a>
        <form method="post" action="/quest-lines/{{.Line.ID}}/delete" class="inline-form">
            <button type="submit" class="btn-danger-sm" onclick="return confirm('Delete this quest line?')">Delete</button>
        </form>
        {{end}}
        <a href="/quest-lines" class="btn btn-secondary">Cancel</a>
    </div>
</main>
</body>
</html>
{{end}}
