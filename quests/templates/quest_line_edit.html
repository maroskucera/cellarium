{{define "quest_line_edit"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — Edit Quest Line</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>Edit Quest Line</h1>
    <form method="post" action="{{.Action}}">
        <fieldset>
            <legend>Quest Line</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required autofocus
                value="{{if .Line}}{{.Line.Name}}{{end}}"
                {{if .Errors}}{{if index .Errors "name"}}aria-describedby="name-err"{{end}}{{end}}>
            {{if .Errors}}{{if index .Errors "name"}}
            <p id="name-err" style="color:var(--text);font-size:0.875rem">{{index .Errors "name"}}</p>
            {{end}}{{end}}

            <label for="description">Description</label>
            <textarea id="description" name="description">{{if .Line}}{{if .Line.Description.Valid}}{{.Line.Description.String}}{{end}}{{end}}</textarea>

            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" min="0"
                value="{{if .Line}}{{.Line.SortOrder}}{{else}}0{{end}}">
        </fieldset>
        <button type="submit">Save Changes</button>
        <p style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem">
            <a href="/quest-lines" class="btn btn-secondary">Cancel</a>
            {{if .Line}}
            <form method="post" action="/quest-lines/{{.Line.ID}}/delete" style="display:inline">
                <button type="submit" class="btn-danger-sm" onclick="return confirm('Delete this quest line?')">Delete</button>
            </form>
            {{end}}
        </p>
    </form>
</main>
</body>
</html>
{{end}}
