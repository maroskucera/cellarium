{{define "quest_line_new"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — New Quest Line</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>New Quest Line</h1>
    <form method="post" action="{{.Action}}">
        <fieldset>
            <legend>Quest Line</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required autofocus
                {{if .Errors}}{{if index .Errors "name"}}aria-describedby="name-err"{{end}}{{end}}>
            {{if .Errors}}{{if index .Errors "name"}}
            <p id="name-err" style="color:var(--text);font-size:0.875rem">{{index .Errors "name"}}</p>
            {{end}}{{end}}

            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>

            <label for="quest_type">Type</label>
            <select id="quest_type" name="quest_type">
                <option value="">— none —</option>
                <option value="main">Main</option>
                <option value="side">Side</option>
                <option value="daily">Daily</option>
            </select>
        </fieldset>
        <div class="btn-row">
            <button type="submit">Create Quest Line</button>
            <a href="/quest-lines" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
{{end}}
