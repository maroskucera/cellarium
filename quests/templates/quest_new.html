{{define "quest_new"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — New Quest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>New Quest</h1>
    <form method="post" action="{{.Action}}">
        <fieldset>
            <legend>Quest Details</legend>

            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{.Quest.Title}}" required autofocus>

            <label for="description">Description</label>
            <textarea id="description" name="description">{{.Quest.Description}}</textarea>

            <label for="quest_type">Type</label>
            <select id="quest_type" name="quest_type">
                <option value="main"{{if eq .Quest.QuestType "main"}} selected{{end}}>Main</option>
                <option value="side"{{if eq .Quest.QuestType "side"}} selected{{end}}>Side</option>
                <option value="daily"{{if eq .Quest.QuestType "daily"}} selected{{end}}>Daily</option>
            </select>

            <label for="quest_date">Due Date</label>
            <input type="date" id="quest_date" name="quest_date" value="{{.Quest.QuestDate}}">

            <label for="quest_line_id">Quest Line</label>
            <select id="quest_line_id" name="quest_line_id">
                <option value="0">— none —</option>
                {{range .QuestLines}}
                <option value="{{.ID}}"{{if .Selected}} selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>

            <label for="quest_giver">Quest Giver</label>
            <input type="text" id="quest_giver" name="quest_giver" value="{{.Quest.QuestGiver}}" list="quest-givers-list">
            <datalist id="quest-givers-list"></datalist>

            <label for="reminder_time">Reminder Time</label>
            <input type="time" id="reminder_time" name="reminder_time" value="{{.Quest.ReminderTime}}">
        </fieldset>

        <fieldset>
            <legend>Recurrence</legend>
            <label for="recurrence_type">Repeat</label>
            <select id="recurrence_type" name="recurrence_type">
                <option value="none"{{if eq .Quest.RecurrenceType "none"}} selected{{end}}>Never</option>
                <option value="every"{{if eq .Quest.RecurrenceType "every"}} selected{{end}}>Every N</option>
                <option value="after_completion"{{if eq .Quest.RecurrenceType "after_completion"}} selected{{end}}>After completion</option>
            </select>
            <div class="recurrence-row">
                <div>
                    <label for="recurrence_n">Every</label>
                    <input type="number" id="recurrence_n" name="recurrence_n" value="{{.Quest.RecurrenceN}}" min="1" max="365">
                </div>
                <div>
                    <label for="recurrence_unit">Unit</label>
                    <select id="recurrence_unit" name="recurrence_unit">
                        <option value="days"{{if eq .Quest.RecurrenceUnit "days"}} selected{{end}}>Days</option>
                        <option value="weeks"{{if eq .Quest.RecurrenceUnit "weeks"}} selected{{end}}>Weeks</option>
                        <option value="months"{{if eq .Quest.RecurrenceUnit "months"}} selected{{end}}>Months</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <button type="submit">Create Quest</button>
        <p><a href="/" class="btn btn-secondary">Cancel</a></p>
    </form>
</main>
<script src="/static/autocomplete.js"></script>
</body>
</html>
{{end}}
