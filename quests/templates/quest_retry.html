{{define "quest_retry"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quests — Retry Quest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {{template "_nav" .Nav}}
    <h1>Retry Quest</h1>
    <form method="post" action="/quests/{{.QuestID}}/retry">
        <fieldset>
            <legend>Quest Details</legend>

            <label for="title">Title</label>
            <input type="text" id="title" value="{{.QuestName}}" disabled>

            <label for="quest_date">Due Date</label>
            <input type="date" id="quest_date" name="quest_date" value="{{.QuestDate}}">
        </fieldset>

        <div class="btn-row">
            <button type="submit">Retry</button>
            <a href="/log" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
{{end}}
