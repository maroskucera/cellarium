<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Receipt Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <h1>Receipt Tracker</h1>
    {{if .Success}}<div class="message success">Entry saved</div>{{end}}
    {{if .Error}}<div class="message error">{{.Error}}</div>{{end}}
    <form method="POST" action="/" autocomplete="off">
      <div class="field">
        <label for="value">Amount</label>
        <input
          id="value"
          name="value"
          type="text"
          inputmode="decimal"
          placeholder="0.00"
          required
          autofocus
          value="{{.Value}}"
        >
      </div>
      <div class="field">
        <label for="entry_date">Date</label>
        <input
          id="entry_date"
          name="entry_date"
          type="date"
          value="{{if .EntryDate}}{{.EntryDate}}{{else}}{{.Today}}{{end}}"
        >
      </div>
      <div class="field">
        <label for="note">Note</label>
        <input
          id="note"
          name="note"
          type="text"
          placeholder="optional"
          value="{{.Note}}"
        >
      </div>
      <button type="submit">Save Entry</button>
    </form>
  </main>
</body>
</html>
