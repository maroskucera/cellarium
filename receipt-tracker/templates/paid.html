<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Mark as Paid — Receipt Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="paid-page">
  <main>
    <h1>Mark as Paid</h1>
    {{if .Success}}<div class="message success">Entries marked as paid</div>{{end}}
    {{if .Error}}<div class="message error">{{.Error}}</div>{{end}}
    {{if .Batches}}
    <form method="POST" action="/paid">
      <table class="paid-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Batch</th>
            <th class="col-check"><input type="checkbox" id="select-all" title="Select all"></th>
          </tr>
        </thead>
        <tbody>
          {{range .Batches}}
          <tr class="batch-header">
            <td></td>
            <td>Batch {{.Batch}}</td>
            <td></td>
            <td class="col-check"><input type="checkbox" class="batch-toggle" data-batch="{{.Batch}}"></td>
          </tr>
          {{range .Entries}}
          <tr>
            <td>{{.Date}}</td>
            <td>{{.Amount}}</td>
            <td>{{.Batch}}</td>
            <td class="col-check"><input type="checkbox" name="ids" value="{{.ID}}" class="entry-cb" data-batch="{{.Batch}}"></td>
          </tr>
          {{end}}
          {{end}}
        </tbody>
      </table>
      <button type="submit">Mark as Paid</button>
    </form>
    {{else}}
    <p class="empty">No outstanding receipts</p>
    {{end}}
    <a href="/" class="nav-link">Back to entry</a>
  </main>
  <script src="/static/paid.js"></script>
</body>
</html>
